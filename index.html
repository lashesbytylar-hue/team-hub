document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y:flex;gap:16px;justify-content:center;margin:18px 0;\">\n                <sc-for list=\"{{ pinEditDots }}\" as=\"d\" hint-placeholder-count=\"4\"><div style=\"{{ d.dotStyle }}\"><\u002Fdiv><\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:250px;margin:0 auto;width:100%;\">\n                <sc-for list=\"{{ pinEditKeypad }}\" as=\"k\" hint-placeholder-count=\"12\"><button onclick=\"{{ k.onPress }}\" style=\"{{ k.keyStyle }}\">{{ k.label }}<\u002Fbutton><\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:12px;margin-top:18px;\">\n                <button onclick=\"{{ onClosePinEdit }}\" style=\"flex:1;background:#EBE5F5;border:none;border-radius:16px;padding:15px;font-weight:600;color:#7a6e92;font-size:15px;cursor:pointer;\">cancel<\u002Fbutton>\n                <button onclick=\"{{ onSavePin }}\" style=\"flex:1;background:#A9A0F6;border:none;border-radius:16px;padding:15px;font-weight:700;color:#fff;font-size:15px;cursor:pointer;\">save pin<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showShiftEdit }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:absolute;inset:0;z-index:90;display:flex;flex-direction:column;justify-content:flex-end;\">\n            <div onclick=\"{{ onCloseShiftEdit }}\" style=\"position:absolute;inset:0;background:rgba(51,51,49,0.42);\"><\u002Fdiv>\n            <div style=\"position:relative;background:#F7F5FB;border-radius:30px 30px 0 0;padding:22px 22px calc(28px + env(safe-area-inset-bottom,0px));box-shadow:0 -12px 40px rgba(0,0,0,0.22);animation:uaSlideUp 0.28s ease;\">\n              <div style=\"width:40px;height:5px;border-radius:5px;background:#D9D2E6;margin:0 auto 18px;\"><\u002Fdiv>\n              <div style=\"font-family:'Fraunces',serif;font-weight:600;font-size:22px;color:#333331;margin-bottom:3px;\">edit shift<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#9a93a5;margin-bottom:18px;\">{{ editShiftName }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#9a93a5;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:0 2px 7px;\">clock in<\u002Fdiv>\n              <input type=\"datetime-local\" value=\"{{ editInLocal }}\" onchange=\"{{ onEditShiftIn }}\" style=\"width:100%;border:none;background:#fff;border-radius:14px;padding:13px 14px;font-size:15px;color:#333331;outline:none;margin-bottom:14px;\">\n              <div style=\"font-size:12px;color:#9a93a5;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:0 2px 7px;\">clock out<\u002Fdiv>\n              <input type=\"datetime-local\" value=\"{{ editOutLocal }}\" onchange=\"{{ onEditShiftOut }}\" style=\"width:100%;border:none;background:#fff;border-radius:14px;padding:13px 14px;font-size:15px;color:#333331;outline:none;margin-bottom:6px;\">\n              <div style=\"font-size:12px;color:#b3acc0;margin-bottom:18px;\">leave clock out blank if still on shift<\u002Fdiv>\n              <div style=\"display:flex;gap:12px;\">\n                <button onclick=\"{{ onDeleteShift }}\" style=\"appearance:none;border:1.5px solid #F3D4DE;background:#fff;border-radius:16px;padding:15px 18px;font-weight:700;color:#c98ba0;font-size:15px;cursor:pointer;\">delete<\u002Fbutton>\n                <button onclick=\"{{ onSaveShift }}\" style=\"flex:1;appearance:none;border:none;background:#A9A0F6;border-radius:16px;padding:15px;font-weight:700;color:#fff;font-size:15px;cursor:pointer;\">save shift<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showToast }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:absolute;left:50%;bottom:calc(104px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);background:#333331;color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:500;box-shadow:0 12px 28px rgba(0,0,0,0.28);z-index:80;white-space:nowrap;animation:uaToast 0.3s ease;\">{{ toast }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:924},&quot;startAt&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;login&quot;,&quot;staff&quot;,&quot;onshift&quot;,&quot;admin&quot;],&quot;default&quot;:&quot;login&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showDemoPin&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;clockAccent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;options&quot;:[&quot;#A9A0F6&quot;,&quot;#CA9EF4&quot;,&quot;#ECB1E1&quot;,&quot;#73ADF5&quot;],&quot;default&quot;:&quot;#A9A0F6&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  STAFF = [\n    {name:'Sienna', role:'Lash Artist', pin:'1111', color:'#F3C9B6'},\n    {name:'Chelsea', role:'Lash Artist', pin:'2222', color:'#ECB1E1'},\n    {name:'Tori', role:'Lash Artist', pin:'3333', color:'#D6ED7D'},\n    {name:'Tylar', role:'Owner / Admin', pin:'4321', color:'#CA9EF4', admin:true},\n  ];\n  WD = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\n  WDF = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];\n  MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n  MOF = ['January','February','March','April','May','June','July','August','September','October','November','December'];\n  PAIRS = {'#A9A0F6':'#8E84EE','#CA9EF4':'#A9A0F6','#ECB1E1':'#CA9EF4','#73ADF5':'#5b9af0'};\n\n  POLICIES = [\n    {id:'attend', title:'attendance & punctuality', color:'#CA9EF4', icon:'clock', summary:'Arrive ready to start your first appointment on time.',\n     sections:[\n       {h:'Being on time', points:[\"Arrive 10 minutes before your first client so your station is set up and you're ready to go.\",\"Clock in as soon as you arrive using the Team Hub.\",\"Running late? Message Tylar as early as you can so clients can be looked after.\"]},\n       {h:'Absences', points:[\"Give at least 2 weeks notice for planned leave where possible.\",\"For sick days, call or message before your first appointment so we can rebook clients.\"]},\n     ]},\n    {id:'hygiene', title:'hygiene & presentation', color:'#ECB1E1', icon:'sparkle', summary:'Clean station, clean tools, polished personal presentation.',\n     sections:[\n       {h:'Station & tools', points:[\"Sanitise tools and surfaces between every single client.\",\"Use fresh disposables for each appointment.\",\"Reset your station to spotless at the end of every shift.\"]},\n       {h:'Personal presentation', points:[\"Wear clean Unreal Artistry blacks.\",\"Hair tied back, nails tidy, minimal fragrance.\"]},\n     ]},\n    {id:'comms', title:'client communication', color:'#73ADF5', icon:'chat', summary:'Warm, professional and clear from welcome to rebook.',\n     sections:[\n       {h:'During the appointment', points:[\"Greet every client by name and confirm the service before you begin.\",\"Walk them through aftercare clearly before they leave.\"]},\n       {h:'Bookings & follow-up', points:[\"Always offer to rebook the next appointment at checkout.\",\"Log any client notes in Timely so the whole team stays in the loop.\"]},\n     ]},\n    {id:'social', title:'social media & confidentiality', color:'#F3C9B6', icon:'lock', summary:'Protect client privacy and represent the brand beautifully online.',\n     sections:[\n       {h:'Posting', points:[\"Only post client photos with their permission.\",\"Tag @unrealartistry and keep to the brand look & feel.\"]},\n       {h:'Confidentiality', points:[\"Never share client details outside the team.\",\"Keep pricing, formulas and business info in-house.\"]},\n     ]},\n  ];\n\n  state = {\n    view:'pick', user:null, selectedName:null, pin:'', pinError:false,\n    tab:'home', shifts:[], announcements:[], activePolicy:null,\n    showPost:false, draftTitle:'', draftBody:'', draftPinned:false,\n    period:'week', tick:0, toast:null,\n    policies:[], editingPolicy:null, showPolicyEdit:false,\n    scriptUrl:'', connected:false, syncing:false, draftUrl:'',\n    showShiftEdit:false, editingShift:null,\n    pins:{}, showPinEdit:false, editingPinName:'', pinDraft:'',\n  };\n\n  componentDidMount(){\n    // a configured Google Sheets backend can arrive via a shared #cfg= link or be saved locally\n    let scriptUrl='';\n    try{\n      const params=new URLSearchParams((location.hash||'').replace(/^#/,''));\n      const cfg=params.get('cfg')||new URLSearchParams(location.search).get('cfg');\n      if(cfg){ scriptUrl=atob(decodeURIComponent(cfg)); localStorage.setItem('ua_hub_script_url', scriptUrl); try{ history.replaceState(null,'',location.pathname); }catch(e){} }\n      else { scriptUrl=localStorage.getItem('ua_hub_script_url')||''; }\n    }catch(e){}\n\n    // immediate paint from cache; seed demo data only when there's no backend\n    let shifts, anns, policies;\n    try { shifts = JSON.parse(localStorage.getItem('ua_hub_shifts_v1')); } catch(e){}\n    try { anns = JSON.parse(localStorage.getItem('ua_hub_anns_v1')); } catch(e){}\n    try { policies = JSON.parse(localStorage.getItem('ua_hub_policies_v1')); } catch(e){}\n    let pins; try { pins = JSON.parse(localStorage.getItem('ua_hub_pins_v1')); } catch(e){}\n    if(!pins || typeof pins!=='object') pins={};\n    if(!Array.isArray(shifts) || !shifts.length){ shifts = scriptUrl?[]:this.seedShifts(); if(!scriptUrl) localStorage.setItem('ua_hub_shifts_v1', JSON.stringify(shifts)); }\n    if(!Array.isArray(anns) || !anns.length){ anns = scriptUrl?[]:this.seedAnns(); if(!scriptUrl) localStorage.setItem('ua_hub_anns_v1', JSON.stringify(anns)); }\n    if(!Array.isArray(policies) || !policies.length){ policies = JSON.parse(JSON.stringify(this.POLICIES)); if(!scriptUrl) localStorage.setItem('ua_hub_policies_v1', JSON.stringify(policies)); }\n\n    const patch = {shifts, announcements:anns, policies, pins, scriptUrl};\n    const start = this.props.startAt;\n    if(start && start !== 'login'){\n      let u = this.STAFF[0];\n      if(start === 'onshift') u = this.STAFF.find(s=>s.name==='Chelsea');\n      else if(start === 'admin') u = this.STAFF.find(s=>s.admin);\n      patch.user = u; patch.view = 'app'; patch.tab = u.admin ? 'payroll' : 'home';\n    }\n    this.setState(patch);\n    if(scriptUrl){ this.refresh(true); this._poll=setInterval(()=>this.refresh(false), 12000); }\n  }\n  componentWillUnmount(){ clearInterval(this._timer); clearInterval(this._poll); clearTimeout(this._toast); }\n\n  jsonp(params){\n    return new Promise((resolve,reject)=>{\n      const url=this.state.scriptUrl; if(!url){ reject(new Error('no url')); return; }\n      const cb='ua_cb_'+Math.random().toString(36).slice(2);\n      const s=document.createElement('script'); let done=false;\n      const cleanup=()=>{ try{ delete window[cb]; }catch(e){} if(s.parentNode) s.parentNode.removeChild(s); };\n      window[cb]=(data)=>{ done=true; cleanup(); resolve(data); };\n      s.onerror=()=>{ if(!done){ cleanup(); reject(new Error('network')); } };\n      const q=Object.assign({callback:cb}, params);\n      s.src=url+(url.indexOf('?')>=0?'&':'?')+Object.keys(q).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(q[k]==null?'':q[k])).join('&');\n      document.body.appendChild(s);\n      setTimeout(()=>{ if(!done){ cleanup(); reject(new Error('timeout')); } }, 15000);\n    });\n  }\n  api(action, params){ return this.jsonp(Object.assign({action:action||'sync'}, params||{})); }\n  applyServer(d){\n    if(!d || !d.ok) return false;\n    const patch={connected:true, syncing:false};\n    if(Array.isArray(d.shifts)) patch.shifts=d.shifts;\n    if(Array.isArray(d.announcements)) patch.announcements=d.announcements;\n    if(Array.isArray(d.policies) && d.policies.length) patch.policies=d.policies;\n    if(d.pins && typeof d.pins==='object' && Object.keys(d.pins).length) patch.pins=Object.assign({}, this.state.pins, d.pins);\n    this.setState(patch);\n    try{\n      if(patch.shifts) localStorage.setItem('ua_hub_shifts_v1', JSON.stringify(patch.shifts));\n      if(patch.announcements) localStorage.setItem('ua_hub_anns_v1', JSON.stringify(patch.announcements));\n      if(patch.policies) localStorage.setItem('ua_hub_policies_v1', JSON.stringify(patch.policies));\n      if(patch.pins) localStorage.setItem('ua_hub_pins_v1', JSON.stringify(patch.pins));\n    }catch(e){}\n    return true;\n  }\n  refresh(initial){\n    if(!this.state.scriptUrl) return;\n    this.setState({syncing:true});\n    this.api('sync').then(d=>{\n      const ok=this.applyServer(d);\n      if(ok && initial) this.seedServerIfEmpty(d);\n      if(!ok) this.setState({syncing:false, connected:false});\n    }).catch(()=>{ this.setState({syncing:false, connected:false}); if(initial) this.toast(\"can't reach the sheet — showing saved data\"); });\n  }\n  seedServerIfEmpty(d){\n    if(!d.announcements || !d.announcements.length){ const a=this.seedAnns()[0]; this.api('postAnnouncement',{title:a.title, body:a.body, pinned:'true'}).then(r=>this.applyServer(r)).catch(()=>{}); }\n    if(!d.policies || !d.policies.length){ this.api('savePolicies',{data:JSON.stringify(this.POLICIES)}).then(r=>this.applyServer(r)).catch(()=>{}); }\n  }\n  setScriptUrl(){\n    const url=(this.state.draftUrl||'').trim();\n    if(!/^https:\\/\\/script\\.google\\.com\\//.test(url)){ this.toast('paste your full web app url'); return; }\n    localStorage.setItem('ua_hub_script_url', url);\n    this.setState({scriptUrl:url, syncing:true});\n    this.toast('connecting…');\n    this.api('setup').then(d=>{ if(this.applyServer(d)){ this.seedServerIfEmpty(d); this.toast('connected ✦ your sheet is live'); } else { this.setState({connected:false, syncing:false
